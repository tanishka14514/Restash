<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Restash - Log In</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 80px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }
    h1 { text-align: center; }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 25px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #2a7;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background: #196; }
    .error { color: #c33; text-align: center; margin-bottom: 10px; }
    .link { text-align: center; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Restash</h1>
  <div class="card">
    <h2>Log in</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Log in</button>
    </form>
    <div class="link">No account? <a href="/signup">Sign up</a></div>
    <div class="link"><a href="/reset_password">Forgot password?</a></div>
  </div>
</body>
</html>
